<script>
/* ============================================================
   PEDAGOGO.AI — JavaScript Utilitário (Client-side)
   ============================================================ */

/** Navega para uma página da SPA (show/hide sections) */
function navegarPara(pagina) {
  document.querySelectorAll('.pagina').forEach(function(el) {
    el.classList.add('oculto');
  });
  var alvo = document.getElementById('pg-' + pagina);
  if (alvo) {
    alvo.classList.remove('oculto');
    alvo.scrollTop = 0;
    window.scrollTo(0, 0);
  }
  // Limpar resultado anterior ao navegar
  document.querySelectorAll('.resultado-container').forEach(function(el) {
    el.innerHTML = '';
  });
}

/** Mostra overlay de carregamento com mensagem customizada */
function mostrarLoading(msg) {
  var overlay = document.getElementById('loading-overlay');
  var msgEl = document.getElementById('loading-msg');
  if (msgEl) msgEl.textContent = msg || 'Processando...';
  if (overlay) overlay.classList.add('ativo');
  // Desabilitar botões
  document.querySelectorAll('.btn-primary, .btn-success').forEach(function(b) {
    b.disabled = true;
  });
}

/** Esconde o overlay de carregamento */
function esconderLoading() {
  var overlay = document.getElementById('loading-overlay');
  if (overlay) overlay.classList.remove('ativo');
  document.querySelectorAll('.btn-primary, .btn-success').forEach(function(b) {
    b.disabled = false;
  });
}

/** Exibe notificação temporária (toast) */
function mostrarToast(msg, tipo) {
  tipo = tipo || 'info';
  var container = document.getElementById('toast-container');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + tipo;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    setTimeout(function() { toast.remove(); }, 300);
  }, 3500);
}

/** Wrapper para google.script.run com loading e tratamento de erro */
function chamarServidor(funcao, args, onSucesso, msgLoading) {
  mostrarLoading(msgLoading || 'Processando...');
  var runner = google.script.run
    .withSuccessHandler(function(resultado) {
      esconderLoading();
      if (onSucesso) onSucesso(resultado);
    })
    .withFailureHandler(function(erro) {
      esconderLoading();
      mostrarToast('Erro: ' + erro.message, 'erro');
      console.error(erro);
    });
  // Chamar a função do servidor com argumentos
  runner[funcao].apply(runner, args || []);
}

/** Exibe resultado de sucesso com link num container */
function mostrarResultado(containerId, titulo, url, infoExtra) {
  var container = document.getElementById(containerId);
  if (!container) return;
  var html = '<div class="resultado"><h3>✅ ' + escapeHtml(titulo) + '</h3>';
  if (url) {
    html += '<a href="' + escapeHtml(url) + '" target="_blank">' + escapeHtml(url) + '</a>';
    html += '<div class="mt-8"><button class="btn-copiar btn btn-sm" onclick="copiarTexto(\'' +
            escapeHtml(url) + '\')">📋 Copiar link</button></div>';
  }
  if (infoExtra) {
    html += '<div class="resultado-info">' + infoExtra + '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

/** Exibe resultado de erro num container */
function mostrarResultadoErro(containerId, mensagem) {
  var container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '<div class="resultado resultado-erro"><h3>❌ Erro</h3><p>' +
    escapeHtml(mensagem) + '</p></div>';
}

/** Copia texto para o clipboard */
function copiarTexto(texto) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(texto).then(function() {
      mostrarToast('Link copiado!', 'sucesso');
    });
  } else {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = texto;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    mostrarToast('Link copiado!', 'sucesso');
  }
}

/** Popula um <select> com opções */
function preencherSelect(elementId, opcoes, placeholder) {
  var select = document.getElementById(elementId);
  if (!select) return;
  select.innerHTML = '';
  if (placeholder) {
    var opt = document.createElement('option');
    opt.value = '';
    opt.textContent = placeholder;
    opt.disabled = true;
    opt.selected = true;
    select.appendChild(opt);
  }
  opcoes.forEach(function(op) {
    var opt = document.createElement('option');
    if (typeof op === 'object') {
      opt.value = op.valor || op.value || op;
      opt.textContent = op.texto || op.label || op;
    } else {
      opt.value = op;
      opt.textContent = op;
    }
    select.appendChild(opt);
  });
}

/** Validação simples: verifica se campos required estão preenchidos */
function validarCampos(formId) {
  var form = document.getElementById(formId);
  if (!form) return false;
  var campos = form.querySelectorAll('[required]');
  var valido = true;
  campos.forEach(function(campo) {
    campo.style.borderColor = '';
    if (!campo.value || !campo.value.trim()) {
      campo.style.borderColor = 'var(--cor-erro)';
      valido = false;
    }
  });
  if (!valido) mostrarToast('Preencha todos os campos obrigatórios.', 'erro');
  return valido;
}

/** Obtém valores de checkboxes marcados */
function obterCheckboxesMarcados(name) {
  var checks = document.querySelectorAll('input[name="' + name + '"]:checked');
  return Array.prototype.map.call(checks, function(c) { return c.value; });
}

/** Obtém valor de radio selecionado */
function obterRadioSelecionado(name) {
  var radio = document.querySelector('input[name="' + name + '"]:checked');
  return radio ? radio.value : null;
}

/** Escape HTML para prevenir XSS */
function escapeHtml(text) {
  if (!text) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

/** Popula selects de turma chamando o servidor */
function carregarTurmas(selectId) {
  chamarServidor('listarTurmasAtivasHTML', [], function(turmas) {
    preencherSelect(selectId, turmas || [], '— Selecione a turma —');
  }, 'Carregando turmas...');
}

/* ── BNCC AUTOCOMPLETE ENGINE ───────────────────────────── */

window._bnccData    = null;
window._bnccLoading = false;
window._bnccQueue   = [];

/** Carrega catálogo BNCC do servidor uma única vez e executa callbacks */
function _carregarCacheBNCC(cb) {
  if (window._bnccData !== null) { if (cb) cb(); return; }
  if (cb) window._bnccQueue.push(cb);
  if (window._bnccLoading) return;
  window._bnccLoading = true;
  google.script.run
    .withSuccessHandler(function(dados) {
      window._bnccData    = dados || [];
      window._bnccLoading = false;
      window._bnccQueue.forEach(function(f) { f(); });
      window._bnccQueue   = [];
    })
    .withFailureHandler(function() {
      window._bnccData    = [];
      window._bnccLoading = false;
      window._bnccQueue   = [];
    })
    .listarTodosBNCCAutocompleteHTML();
}

/**
 * Inicializa autocomplete BNCC em um campo de texto.
 * Cria dropdown de sugestões ao digitar e preview ao selecionar.
 * @param {string} inputId — ID do input
 */
function initBNCCAutocomplete(inputId) {
  var input = document.getElementById(inputId);
  if (!input || input._bnccInit) return;
  input._bnccInit = true;

  // Envolve o input num wrapper relativo (necessário para o dropdown absoluto)
  var wrapper = document.createElement('div');
  wrapper.className = 'bncc-autocomplete';
  input.parentNode.insertBefore(wrapper, input);
  wrapper.appendChild(input);

  // Dropdown de sugestões
  var dd = document.createElement('div');
  dd.className = 'bncc-dropdown';
  dd.style.display = 'none';
  wrapper.appendChild(dd);

  // Card de preview (exibido após seleção, abaixo do wrapper)
  var preview = document.createElement('div');
  preview.className = 'bncc-preview';
  preview.style.display = 'none';
  wrapper.parentNode.insertBefore(preview, wrapper.nextSibling);

  function fechar() { dd.style.display = 'none'; }

  function mostrar(q) {
    if (!window._bnccData || !q || q.length < 2) { fechar(); return; }
    var upper = q.toUpperCase();
    var lower = upper.toLowerCase();
    var lista = window._bnccData.filter(function(h) {
      return h.codigo.indexOf(upper) !== -1
          || h.descricao.toLowerCase().indexOf(lower) !== -1
          || h.componente.toLowerCase().indexOf(lower) !== -1
          || h.anoSerie.toLowerCase().indexOf(lower) !== -1;
    }).slice(0, 8);
    if (!lista.length) { fechar(); return; }
    dd.innerHTML = '';
    lista.forEach(function(h) {
      var item = document.createElement('div');
      item.className = 'bncc-item';
      var desc = h.descricao.length > 110 ? h.descricao.substring(0, 110) + '…' : h.descricao;
      item.innerHTML =
        '<div class="bncc-item-codigo">' + h.codigo + '</div>' +
        '<div class="bncc-item-meta">' + escapeHtml(h.componente) + ' · ' + escapeHtml(h.anoSerie) + '</div>' +
        '<div class="bncc-item-desc">' + escapeHtml(desc) + '</div>';
      item.addEventListener('mousedown', function(e) {
        e.preventDefault(); // evita blur antes do click registrar
        input.value = h.codigo;
        fechar();
        _mostrarPreviewBNCC(preview, h);
        input.dispatchEvent(new Event('change'));
      });
      dd.appendChild(item);
    });
    dd.style.display = 'block';
  }

  // Pré-carrega catálogo ao focar no campo pela primeira vez
  input.addEventListener('focus', function() { _carregarCacheBNCC(); });

  input.addEventListener('input', function() {
    var q = input.value.trim();
    preview.style.display = 'none';
    if (!window._bnccData) {
      _carregarCacheBNCC(function() { mostrar(q); });
    } else {
      mostrar(q);
    }
  });

  // Ao perder foco: fecha dropdown e exibe preview se código válido
  input.addEventListener('blur', function() {
    setTimeout(fechar, 200);
    var val = input.value.trim().toUpperCase();
    if (val.length >= 6 && window._bnccData) {
      var found = null;
      for (var i = 0; i < window._bnccData.length; i++) {
        if (window._bnccData[i].codigo === val) { found = window._bnccData[i]; break; }
      }
      if (found) _mostrarPreviewBNCC(preview, found);
    }
  });

  document.addEventListener('click', function(e) {
    if (!wrapper.contains(e.target)) fechar();
  });
}

/** Exibe card de preview com os dados da habilidade selecionada */
function _mostrarPreviewBNCC(el, h) {
  el.innerHTML =
    '<span class="bncc-preview-codigo">' + h.codigo + '</span>' +
    ' · ' + escapeHtml(h.componente) + ' · ' + escapeHtml(h.anoSerie) +
    '<div>' + escapeHtml(h.descricao) + '</div>';
  el.style.display = 'block';
}
</script>
